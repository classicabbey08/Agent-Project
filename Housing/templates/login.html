{% extends 'base.html' %}

{% block title %}Login - NaijaNest{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto py-16 px-6">
    <h1 class="text-3xl font-bold text-center mb-8">Sign In to NaijaNest</h1>

    {% if form.errors %}
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
        Invalid username or password.
      </div>
    {% endif %}

    <form method="post" class="space-y-6">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">
        Login
      </button>
    </form>

    <p class="text-center mt-6">
      Don't have an account? <a href="{% url 'signup' %}" class="text-indigo-600 hover:underline">Sign Up</a>
    </p>
  </div>
{% endblock %}
