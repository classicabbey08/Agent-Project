{% extends 'base.html' %}

{% block title %}Sign Up - NaijaNest{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto py-16 px-6">
    <h1 class="text-3xl font-bold text-center mb-8">Join NaijaNest</h1>

    <form method="post" class="space-y-6">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="flex items-center">
        <input type="checkbox" name="is_agent" id="is_agent" class="h-5 w-5 text-indigo-600">
        <label for="is_agent" class="ml-2 text-gray-700">I am an agent or landlord (listing properties)</label>
      </div>

      <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">
        Create Account
      </button>
    </form>

    <p class="text-center mt-6">
      Already have an account? <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Login</a>
    </p>
  </div>
{% endblock %}
